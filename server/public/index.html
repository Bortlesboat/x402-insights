<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>x402-insights</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Inter, sans-serif; margin: 0; background: #0b0d10; color: #e8eaed; }
  header { padding: 20px 28px; border-bottom: 1px solid #1e2228; display: flex; justify-content: space-between; align-items: center; }
  h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { color: #8a93a0; font-size: 13px; }
  main { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat { background: #13171d; border: 1px solid #1e2228; border-radius: 10px; padding: 16px 18px; }
  .stat .label { color: #8a93a0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat .value { font-size: 26px; font-weight: 600; margin-top: 6px; }
  .stat .value.small { font-size: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .card { background: #13171d; border: 1px solid #1e2228; border-radius: 10px; padding: 18px; }
  .card h3 { margin: 0 0 14px; font-size: 14px; font-weight: 600; color: #c8cdd4; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: #8a93a0; font-weight: 500; padding: 8px 10px; border-bottom: 1px solid #1e2228; }
  td { padding: 8px 10px; border-bottom: 1px solid #1a1e24; }
  tr:last-child td { border-bottom: none; }
  .muted { color: #8a93a0; }
  .err { color: #ff6b6b; }
  .ok { color: #51cf66; }
  select { background: #13171d; color: #e8eaed; border: 1px solid #1e2228; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  .events-wrap { max-height: 400px; overflow: auto; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em; }
  .badge-testnet { background: #1a3a2a; color: #51cf66; }
  .badge-dev { background: #2a2a1a; color: #f0c040; }
  .badge-sim { background: #1a1a2a; color: #748ffc; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <div>
    <h1>x402-insights</h1>
    <div class="sub">what your agent is actually spending</div>
  </div>
  <div style="display:flex;gap:16px;align-items:center">
    <div>
      <label class="muted" style="font-size:13px;margin-right:8px">env</label>
      <select id="env">
        <option value="testnet" selected>testnet</option>
        <option value="dev">dev / sim</option>
        <option value="all">all</option>
      </select>
    </div>
    <div>
      <label class="muted" style="font-size:13px;margin-right:8px">mode</label>
      <select id="mode">
        <option value="live" selected>live</option>
        <option value="demo">demo</option>
        <option value="all">all</option>
      </select>
    </div>
    <div>
      <label class="muted" style="font-size:13px;margin-right:8px">window</label>
      <select id="window">
        <option value="1">1h</option>
        <option value="24" selected>24h</option>
        <option value="168">7d</option>
        <option value="720">30d</option>
      </select>
    </div>
  </div>
</header>
<main>
  <div class="stats" id="stats"></div>
  <div class="grid">
    <div class="card">
      <h3>Spend by endpoint</h3>
      <canvas id="endpointChart" height="180"></canvas>
      <table id="endpointTable" style="margin-top:14px"></table>
    </div>
    <div class="card">
      <h3>Spend by agent</h3>
      <canvas id="agentChart" height="180"></canvas>
      <table id="agentTable" style="margin-top:14px"></table>
    </div>
  </div>
  <div class="card">
    <h3>Recent events</h3>
    <div class="events-wrap">
      <table id="eventsTable"></table>
    </div>
  </div>
</main>
<script>
const fmt = {
  usd: (n) => "$" + (Number(n) || 0).toFixed(4),
  pct: (n) => ((Number(n) || 0) * 100).toFixed(1) + "%",
  ms:  (n) => Math.round(Number(n) || 0) + "ms",
  int: (n) => (Number(n) || 0).toLocaleString(),
};

let endpointChart, agentChart;

async function j(url) { const r = await fetch(url); return r.json(); }

function renderStats(o) {
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="label">Total spend</div><div class="value">${fmt.usd(o.total_cost)}</div></div>
    <div class="stat"><div class="label">Error rate</div><div class="value ${o.error_rate>0.05?'err':''}">${fmt.pct(o.error_rate)}</div></div>
    <div class="stat"><div class="label">Retry spend %</div><div class="value ${o.retry_spend_pct>0.15?'err':''}">${fmt.pct(o.retry_spend_pct)}</div></div>
    <div class="stat"><div class="label">Top cost driver</div><div class="value small">${o.top_endpoint || '—'}<div class="muted" style="font-size:12px;font-weight:400;margin-top:2px">${fmt.usd(o.top_endpoint_cost)}</div></div></div>
    <div class="stat"><div class="label">Cost per success</div><div class="value small">${fmt.usd(o.cost_per_success)}</div></div>
    <div class="stat"><div class="label">Requests</div><div class="value small">${fmt.int(o.requests)}</div></div>
  `;
}

function renderBarChart(ctx, existing, labels, data, label) {
  if (existing) existing.destroy();
  return new Chart(ctx, {
    type: "bar",
    data: { labels, datasets: [{ label, data, backgroundColor: "#4c8bf5", borderRadius: 4 }] },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#8a93a0" }, grid: { color: "#1a1e24" } },
        y: { ticks: { color: "#8a93a0" }, grid: { color: "#1a1e24" } },
      },
    },
  });
}

function renderTable(el, headers, rows, cells) {
  el.innerHTML = `<thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead>` +
    `<tbody>${rows.map(r=>`<tr>${cells(r).map(c=>`<td>${c}</td>`).join("")}</tr>`).join("") || `<tr><td class="muted">no data yet</td></tr>`}</tbody>`;
}

function envBadge(env) {
  if (env === "testnet") return `<span class="badge badge-testnet">TESTNET</span>`;
  if (env === "dev") return `<span class="badge badge-dev">DEV</span>`;
  return `<span class="badge badge-sim">SIM</span>`;
}

function phaseBadge(phase) {
  if (!phase) return `<span class="muted">-</span>`;
  const cls = phase === "settle" ? "err" : "ok";
  return `<span class="${cls}">${phase}</span>`;
}

async function refresh() {
  const h = document.getElementById("window").value;
  const m = document.getElementById("mode").value;
  const e = document.getElementById("env").value;
  const qs = `hours=${h}&mode=${m}&env=${e}`;
  const [overview, byEp, byAg, evs] = await Promise.all([
    j(`/api/overview?${qs}`),
    j(`/api/by-endpoint?${qs}`),
    j(`/api/by-agent?${qs}`),
    j(`/api/events?limit=100&mode=${m}&env=${e}`),
  ]);
  renderStats(overview);
  endpointChart = renderBarChart(
    document.getElementById("endpointChart"), endpointChart,
    byEp.map(r=>r.endpoint), byEp.map(r=>r.total_cost), "cost"
  );
  agentChart = renderBarChart(
    document.getElementById("agentChart"), agentChart,
    byAg.map(r=>r.agent), byAg.map(r=>r.total_cost), "cost"
  );
  renderTable(
    document.getElementById("endpointTable"),
    ["endpoint","requests","total","avg"],
    byEp,
    r => [r.endpoint, fmt.int(r.requests), fmt.usd(r.total_cost), fmt.usd(r.avg_cost)]
  );
  renderTable(
    document.getElementById("agentTable"),
    ["agent","requests","total"],
    byAg,
    r => [r.agent, fmt.int(r.requests), fmt.usd(r.total_cost)]
  );
  renderTable(
    document.getElementById("eventsTable"),
    ["time","phase","endpoint","cost","latency","status","env"],
    evs,
    r => [
      new Date(r.timestamp).toLocaleTimeString(),
      phaseBadge(r.phase),
      r.endpoint,
      fmt.usd(r.cost), fmt.ms(r.latency_ms),
      `<span class="${r.status==='error'?'err':'ok'}">${r.status}</span>`,
      envBadge(r.environment)
    ]
  );
}

document.getElementById("window").addEventListener("change", refresh);
document.getElementById("mode").addEventListener("change", refresh);
document.getElementById("env").addEventListener("change", refresh);
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
